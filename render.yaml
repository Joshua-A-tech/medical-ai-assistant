services:
  - type: web
    name: medical-ai-assistant
    runtime: python
    repo: https://github.com/YOUR_USERNAME/medical-ai-assistant
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 10000
